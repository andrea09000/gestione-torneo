<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Live</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .tv-container {
            max-width: 85%;
            margin: 40px auto;
            text-align: center;
        }

        .scoreboard {
            background: linear-gradient(135deg, #111827, #1f2937);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
        }

        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
        }

        .team { width: 40%; }

        .score {
            font-size: 60px;
            font-weight: bold;
            color: #22c55e;
        }

        .status {
            margin-top: 10px;
            font-size: 14px;
            opacity: 0.7;
        }

        .lineups { display: flex; gap: 20px; }

        .box {
            flex: 1;
            background: #111827;
            border-radius: 15px;
            padding: 20px;
        }

        .box h3 {
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .player {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .number { color: #facc15; font-weight: bold; }

        .name {
            text-align: left;
            flex: 1;
            margin-left: 10px;
        }

        .time {
            font-size: 40px;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .empty-msg {
            margin-top: 100px;
            font-size: 32px;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .lineups { flex-direction: column; }
            .teams { font-size: 18px; }
            .score { font-size: 40px; }
        }
    </style>
</head>
<body>

<div id="navbar-mount"></div>

<div class="tv-container" id="tvContainer">
    <div class="empty-msg">Caricamento...</div>
</div>

<script type="module" src="js/tv.js"></script>
</body>
</html>
