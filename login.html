<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo Agnosine - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background:
                linear-gradient(rgba(5,11,24,0.9), rgba(5,11,24,0.95)),
                url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=1600&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
        }

        .login-wrapper {
            min-height: calc(100vh - 80px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 35px 25px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo { text-align: center; margin-bottom: 25px; }
        .logo-icon { font-size: 70px; }
        .logo h1 { margin-top: 10px; font-size: 34px; font-weight: 900; color: #22c55e; }
        .logo p { color: #9ca3af; font-size: 15px; }

        .input-group-custom { margin-bottom: 18px; }
        .input-label {
            display: block; margin-bottom: 8px;
            font-weight: 700; font-size: 15px; color: #d1d5db;
        }
        .input-custom {
            width: 100%; padding: 18px; border: none; border-radius: 18px;
            background: #1f2937; color: white; font-size: 18px;
        }
        .input-custom:focus { outline: none; box-shadow: 0 0 0 3px #22c55e; }

        .login-btn {
            width: 100%; padding: 18px; border: none; border-radius: 18px;
            background: #22c55e; color: black; font-size: 20px;
            font-weight: 900; margin-top: 10px; transition: 0.2s;
        }
        .login-btn:hover { transform: scale(1.02); background: #16a34a; }

        .error {
            background: #7f1d1d; padding: 10px;
            border-radius: 12px; margin-bottom: 15px;
            text-align: center; display: none;
        }

        .footer-text {
            text-align: center; margin-top: 20px;
            color: #9ca3af; font-size: 14px;
        }
    </style>
</head>
<body>

<div id="navbar-mount"></div>

<div class="login-wrapper">
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon">⚽</div>
            <h1>Torneo Agnosine</h1>
            <p>Accedi al sistema</p>
        </div>

        <div class="error" id="error">Credenziali non valide</div>

        <form id="loginForm">
            <div class="input-group-custom">
                <label class="input-label">Username</label>
                <input type="text" id="username" class="input-custom" placeholder="Inserisci username" required>
            </div>

            <div class="input-group-custom">
                <label class="input-label">Password</label>
                <input type="password" id="password" class="input-custom" placeholder="*Agnosine26" required>
            </div>

            <button type="submit" class="login-btn">🔑 ACCEDI</button>
        </form>

        <div class="footer-text">Sistema gestione torneo</div>
    </div>
</div>

<script type="module" src="js/navbar.js"></script>
<script type="module" src="js/login.js"></script>
</body>
</html>
