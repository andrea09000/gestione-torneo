<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telecomando - Partita</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .remote {
            max-width: 900px;
            margin: 30px auto;
            padding: 15px;
        }

        .match-card {
            background: linear-gradient(135deg, #111827, #1f2937);
            padding: 20px;
            border-radius: 18px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .match-title { font-size: 22px; font-weight: bold; }

        .score {
            font-size: 40px;
            font-weight: bold;
            color: #22c55e;
            margin-top: 5px;
        }

        .timer {
            font-size: 26px;
            margin-top: 10px;
            color: #facc15;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        button.btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            touch-action: manipulation;
        }

        .start  { background: #22c55e; color: black; }
        .stop   { background: #facc15; color: black; }
        .reset  { background: #60a5fa; color: black; }
        .home   { background: #16a34a; }
        .away   { background: #2563eb; }
        .minus  { background: #ef4444; }
        .finish { background: #dc2626; margin-top: 20px; width: 100%; }

        .section {
            margin-top: 20px;
            background: #111827;
            padding: 15px;
            border-radius: 16px;
        }

        .btn-next {
            display: block;
            width: 100%;
            margin-top: 15px;
            padding: 22px;
            border-radius: 20px;
            text-align: center;
            text-decoration: none;
            font-size: 24px;
            font-weight: 800;
            background: #2563eb;
            color: white;
            box-shadow: 0 8px 25px rgba(37,99,235,0.4);
        }

        .btn-next:hover {
            background: #1d4ed8;
            color: white;
        }
    </style>
</head>
<body>

<div id="navbar-mount"></div>

<div class="remote" id="root">
    <h3 style="text-align:center;margin-top:100px">Caricamento...</h3>
</div>

<script type="module" src="js/navbar.js"></script>
<script type="module" src="js/telecomando-match.js"></script>
</body>
</html>
